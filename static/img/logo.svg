<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Circle Radial Gradient -->
    <radialGradient id="buddha-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141B2D"/>
      <stop offset="75%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#05070E"/>
    </radialGradient>

    <!-- Golden Light Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8D0"/>
      <stop offset="35%" stop-color="#FFD700"/>
      <stop offset="75%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <!-- Cyan Glow Accent Gradient -->
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="aura-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Dark Space Base Outer Circle -->
  <circle cx="100" cy="100" r="92" fill="url(#buddha-bg)" stroke="url(#gold-grad)" stroke-width="3"/>

  <!-- Sci-Fi Inner Dashed Tech Ring -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#cyan-glow)" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.45"/>

  <!-- Buddha Halo (头光/背光) -->
  <circle cx="100" cy="70" r="42" fill="none" stroke="url(#cyan-glow)" stroke-width="1.5" opacity="0.75" filter="url(#aura-glow)"/>
  <circle cx="100" cy="70" r="35" fill="none" stroke="url(#gold-grad)" stroke-width="2.2" filter="url(#aura-glow)"/>

  <!-- Radiant Light Rays (佛光线条) -->
  <g stroke="url(#gold-grad)" stroke-width="1.2" opacity="0.5" stroke-linecap="round">
    <line x1="100" y1="26" x2="100" y2="32"/>
    <line x1="131" y1="39" x2="126" y2="44"/>
    <line x1="144" y1="70" x2="138" y2="70"/>
    <line x1="69" y1="39" x2="74" y2="44"/>
    <line x1="56" y1="70" x2="62" y2="70"/>
  </g>

  <!-- Authentic Seated Buddha Silhouette (真实佛像造型：肉髻、长耳垂、袈裟、结跏趺坐) -->
  <g fill="url(#gold-grad)">
    <!-- Ushnisha (肉髻与珠) -->
    <path d="M 97 39 Q 100 35 103 39 Q 104 43 96 43 Z"/>
    <circle cx="100" cy="36" r="2" fill="#FFF8D0"/>

    <!-- Head & Hair (螺髻与面轮廓) -->
    <ellipse cx="100" cy="50" rx="10" ry="11"/>

    <!-- Long Earlobes (长耳垂) -->
    <path d="M 88 48 C 87 54, 88 60, 90 62 C 91 62, 92 56, 91 50 Z"/>
    <path d="M 112 48 C 113 54, 112 60, 110 62 C 109 62, 108 56, 109 50 Z"/>

    <!-- Neck & Sanbao Collar (颈与三道颈纹) -->
    <path d="M 94 61 L 106 61 L 107 66 L 93 66 Z"/>

    <!-- Main Silhouette: Shoulders, Robe, Crossed Legs (肩膀、袈裟、结跏趺坐) -->
    <path d="M 100 66 
             C 88 70, 70 80, 56 94 
             C 50 102, 46 114, 40 124 
             C 36 130, 38 138, 48 140
             C 62 142, 78 136, 100 136
             C 122 136, 138 142, 152 140
             C 162 138, 164 130, 160 124
             C 154 114, 150 102, 144 94
             C 130 80, 112 70, 100 66 Z"/>

    <!-- Left Shoulder Robe Overlay (偏衫袈裟线条与衣褶) -->
    <path d="M 94 66 C 84 78, 72 98, 68 118 C 78 126, 92 126, 100 126 C 108 126, 122 126, 132 118 C 128 98, 116 78, 106 66 Z" fill="#0B0F19" opacity="0.18"/>
  </g>

  <!-- Dhyana Mudra (双手禅定印：右掌置左掌上，双拇指指尖相接) -->
  <g fill="url(#gold-grad)">
    <path d="M 82 122 C 88 118, 112 118, 118 122 C 120 130, 114 134, 100 134 C 86 134, 80 130, 82 122 Z"/>
  </g>
  <!-- Cutout line for fingers/hands detail -->
  <path d="M 85 123 Q 100 119 115 123" fill="none" stroke="#0B0F19" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 90 127 Q 100 130 110 127" fill="none" stroke="#0B0F19" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lotus Pedestal Base (仰覆莲座) -->
  <g fill="url(#gold-grad)">
    <!-- Central Top Petal -->
    <path d="M 100 140 C 94 146, 90 154, 100 160 C 110 154, 106 146, 100 140 Z"/>
    <!-- Left Petals -->
    <path d="M 84 142 C 76 148, 74 156, 86 161 C 94 156, 92 148, 84 142 Z"/>
    <path d="M 66 144 C 58 150, 56 158, 70 162 C 78 158, 76 150, 66 144 Z"/>
    <path d="M 46 146 C 40 152, 40 158, 52 161 C 60 158, 58 151, 46 146 Z"/>
    <!-- Right Petals -->
    <path d="M 116 142 C 124 148, 126 156, 114 161 C 106 156, 108 148, 116 142 Z"/>
    <path d="M 134 144 C 142 150, 144 158, 130 162 C 122 158, 124 150, 134 144 Z"/>
    <path d="M 154 146 C 160 152, 160 158, 148 161 C 140 158, 142 151, 154 146 Z"/>
  </g>

  <!-- Cyan Quantum Sci-Fi Base Arc (莲座下的科幻光弧) -->
  <path d="M 34 166 Q 100 184 166 166" fill="none" stroke="url(#cyan-glow)" stroke-width="2.5" stroke-linecap="round" filter="url(#aura-glow)"/>
  <circle cx="100" cy="175" r="3.5" fill="#00F2FE" filter="url(#aura-glow)"/>
</svg>